name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 ref에서 새 push 오면 이전 잡 취소 (PR 자주 push할 때 비용 절감)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# 최소 권한 원칙. push & build-push job은 별도로 packages:write 부여.
permissions:
  contents: read

env:
  # GHCR 이미지 이름. owner는 런타임에 소문자로 정규화 (Docker tag lowercase 강제).
  # 실제 IMAGE_NAME은 build-and-push job에서 ghcr.io/<lower owner>/coastcalculator로 조립.
  IMAGE_BASENAME: coastcalculator

jobs:
  # ------------------------------------------------------------
  # PR과 main push 모두 실행. 59 테스트 (T1-6 + T2-9).
  # ------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7
          if-no-files-found: ignore

  # ------------------------------------------------------------
  # main으로 push될 때만 실행. test job 통과 필수.
  # 이미지를 GHCR에 latest + commit SHA(short) 두 태그로 푸시.
  # 배포는 별도(EC2 등) — 여기선 이미지 빌드/푸시만 자동화.
  # ------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker image (GHCR)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR은 owner 경로가 소문자 강제. 'Goospel' 같은 대문자 owner도 안전하게 변환.
      - name: Compute lowercase image name
        id: imgname
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/${{ env.IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgname.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache backend — 빌드 레이어 재사용으로 빌드 시간 ↓
          cache-from: type=gha
          cache-to: type=gha,mode=max
