<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        label { font-size: 0.9rem; }
        input { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .alert { padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 0.9rem; }
        .alert-error { background: #fef2f2; color: #991b1b; }
        .field-error { color: #991b1b; font-size: 0.85rem; }
        .link { margin-top: 16px; font-size: 0.9rem; text-align: center; }
        a { color: #2563eb; }
    </style>
</head>
<body>
<h1>회원가입</h1>

<div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

<form th:action="@{/signup}" th:object="${signupRequest}" method="post">
    <div>
        <label for="username">아이디</label>
        <input type="text" id="username" th:field="*{username}" required autofocus>
        <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>
    <div>
        <label for="password">비밀번호</label>
        <input type="password" id="password" th:field="*{password}" required>
        <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>
    <div>
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" required>
        <div class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></div>
    </div>
    <button type="submit">가입하기</button>
</form>

<div class="link">
    이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
</div>
</body>
</html>
