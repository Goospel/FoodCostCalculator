<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Naver 재료 가져오기</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        input { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .hint { color: #6b7280; font-size: 0.9rem; margin-top: 8px; }
        a { color: #2563eb; }
    </style>
</head>
<body>
<h1>Naver에서 재료 가져오기</h1>
<p><a th:href="@{/admin/ingredients}">← 목록으로</a></p>

<form th:action="@{/admin/ingredients/fetch}" method="post">
    <label>
        검색 키워드
        <input type="text" name="keyword" placeholder="예: 밀가루" required autofocus>
    </label>
    <button type="submit">가져오기</button>
</form>

<p class="hint">
    Naver Shopping API에서 검색해 단위(kg/g/L/ml)가 파싱되는 제품만 DB에 저장합니다.
    이미 존재하는 제품은 가격/메타데이터가 갱신되지만 <strong>관리자가 지정한 카테고리는 보존</strong>됩니다.
    저장 직후 신규 제품은 카테고리 미지정 상태로 추가되니, 목록 페이지에서 개별 지정해 주세요.
</p>
</body>
</html>
