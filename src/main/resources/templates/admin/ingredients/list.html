<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>재료 관리 (관리자)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1200px; margin: 24px auto; padding: 0 16px; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; }
        .actions a, .actions button { margin-left: 6px; }
        .btn { padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #6b7280; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; font-size: 0.92rem; }
        th { background: #f9fafb; }
        .uncategorized { color: #9ca3af; font-style: italic; }
        .flash { padding: 10px; background: #f0fdf4; color: #166534; border-radius: 6px; margin-bottom: 12px; }
        a { color: #2563eb; }
    </style>
</head>
<body>
<nav>
    <h1>재료 관리 (관리자)</h1>
    <div>
        <a th:href="@{/}">홈</a> |
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary">로그아웃</button>
        </form>
    </div>
</nav>

<div th:if="${flashMessage}" class="flash" th:text="${flashMessage}"></div>

<div class="actions" style="margin-bottom:12px">
    <a th:href="@{/admin/ingredients/fetch}" class="btn">+ Naver에서 재료 가져오기</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>제품명</th>
        <th>카테고리</th>
        <th>가격</th>
        <th>용량</th>
        <th>1g당</th>
        <th>몰</th>
        <th>fetchedAt</th>
        <th>액션</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(ingredients)}">
        <td colspan="9" style="text-align:center; padding:20px; color:#6b7280">
            아직 재료가 없습니다. "Naver에서 재료 가져오기"를 눌러 추가하세요.
        </td>
    </tr>
    <tr th:each="i : ${ingredients}">
        <td th:text="${i.id}"></td>
        <td th:text="${i.title}"></td>
        <td>
            <span th:if="${i.category != null}" th:text="${i.category}"></span>
            <span th:if="${i.category == null}" class="uncategorized">미지정</span>
        </td>
        <td th:text="${#numbers.formatInteger(i.price, 3, 'COMMA')} + ' 원'"></td>
        <td th:text="${i.totalAmount + ' ' + i.unit}"></td>
        <td th:text="${i.pricePerGram + ' 원/' + (i.unit.name() == 'G' ? 'g' : 'ml')}"></td>
        <td th:text="${i.mallName}"></td>
        <td th:text="${#temporals.format(i.fetchedAt, 'MM-dd HH:mm')}"></td>
        <td class="actions">
            <a th:href="@{/admin/ingredients/{id}/edit(id=${i.id})}">카테고리 수정</a>
            <form th:action="@{/admin/ingredients/{id}/delete(id=${i.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('정말 삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
