<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오류</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 560px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .code { font-size: 4rem; color: #6b7280; margin: 0; font-weight: 700; }
        h1 { font-size: 1.5rem; margin: 8px 0 16px; }
        .msg { color: #6b7280; line-height: 1.6; background: #f9fafb; padding: 12px; border-radius: 6px; font-size: 0.9rem; }
        .btn { display: inline-block; padding: 10px 18px; background: #2563eb; color: white; border-radius: 8px; text-decoration: none; margin-top: 16px; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<p class="code" th:text="${status} ?: 'Error'"></p>
<h1>요청을 처리할 수 없습니다</h1>
<div class="msg" th:if="${errorMessage}" th:text="${errorMessage}"></div>
<p th:if="${errorMessage == null}">잘못된 요청입니다. 입력값을 확인해 주세요.</p>
<a th:href="@{/}" class="btn">홈으로 돌아가기</a>
</body>
</html>
