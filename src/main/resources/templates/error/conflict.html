<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>저장 충돌 — 다른 곳에서 수정됨</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .code { font-size: 4rem; color: #b45309; margin: 0; font-weight: 700; }
        h1 { font-size: 1.5rem; margin: 8px 0 16px; }
        p { color: #374151; line-height: 1.6; }
        .help { background: #fef3c7; color: #78350f; padding: 14px; border-radius: 8px; font-size: 0.95rem; margin: 16px 0; text-align: left; }
        .btn { display: inline-block; padding: 10px 18px; background: #2563eb; color: white; border-radius: 8px; text-decoration: none; margin: 8px 4px; }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        kbd { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.85rem; border: 1px solid #d1d5db; }
    </style>
</head>
<body>
<p class="code">409</p>
<h1>저장 충돌 — 다른 곳에서 먼저 수정되었습니다</h1>
<p>같은 레시피를 다른 탭(또는 다른 기기)에서 먼저 저장했습니다.<br>
   덮어쓰기 사고를 방지하기 위해 이 저장은 거부되었습니다.</p>

<div class="help">
    <strong>입력 내용을 잃지 않으려면:</strong>
    <ol>
        <li>브라우저 <kbd>뒤로 가기</kbd>로 입력했던 폼으로 돌아가서 내용을 메모해 두세요.</li>
        <li>레시피 수정 페이지를 새로 열어 <strong>최신 상태</strong>를 확인하세요.</li>
        <li>두 내용을 비교해서 합치거나 원하는 버전으로 다시 저장하세요.</li>
    </ol>
</div>

<a th:href="@{/recipes}" class="btn">내 레시피 목록</a>
<a th:href="@{/}" class="btn btn-secondary">홈으로</a>
</body>
</html>
