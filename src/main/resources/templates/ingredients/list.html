<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>재료 조회</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; }
        .filter { background: #f9fafb; padding: 12px; border-radius: 6px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
        .filter input { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; flex: 1; max-width: 240px; }
        .filter .btn { padding: 8px 14px; }
        .btn { padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
        .btn-secondary { background: #6b7280; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; font-size: 0.92rem; }
        th { background: #f9fafb; }
        a { color: #2563eb; }
    </style>
</head>
<body>
<nav>
    <h1>재료 조회</h1>
    <div>
        <a th:href="@{/}">홈</a>
        <span sec:authorize="hasRole('ADMIN')">
            | <a th:href="@{/admin/ingredients}">관리자 페이지</a>
        </span>
        | <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary">로그아웃</button>
        </form>
    </div>
</nav>

<form class="filter" method="get" th:action="@{/ingredients}">
    <label>카테고리 필터:</label>
    <input type="text" name="category" th:value="${category}" placeholder="예: 밀가루">
    <button type="submit" class="btn">조회</button>
    <a th:if="${category != null}" th:href="@{/ingredients}" class="btn btn-secondary">전체</a>
</form>

<p th:if="${category != null}" style="color:#6b7280;font-size:0.9rem">
    카테고리: <strong th:text="${category}"></strong>
</p>

<table>
    <thead>
    <tr>
        <th>제품명</th>
        <th>카테고리</th>
        <th>가격</th>
        <th>용량</th>
        <th>1단위당</th>
        <th>몰</th>
        <th>구매하기</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(ingredients)}">
        <td colspan="7" style="text-align:center; padding:20px; color:#6b7280">
            조회 결과가 없습니다.
        </td>
    </tr>
    <tr th:each="i : ${ingredients}">
        <td>
            <a th:href="${i.link}" target="_blank" rel="noopener noreferrer" th:text="${i.title}"></a>
        </td>
        <td th:text="${i.category}"></td>
        <td th:text="${#numbers.formatInteger(i.price, 3, 'COMMA')} + ' 원'"></td>
        <td th:text="${i.totalAmount + ' ' + i.unit}"></td>
        <td th:text="${i.pricePerGram + ' 원/' + (i.unit.name() == 'G' ? 'g' : 'ml')}"></td>
        <td th:text="${i.mallName}"></td>
        <td>
            <a th:href="${@affiliateLinkBuilder.coupangSearch(i.category != null ? i.category : i.title)}"
               target="_blank" rel="noopener noreferrer sponsored"
               style="font-size:0.85rem;color:#dc2626;">쿠팡 검색</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
