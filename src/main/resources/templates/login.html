<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        label { font-size: 0.9rem; }
        input { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .alert { padding: 10px; border-radius: 6px; margin-top: 12px; font-size: 0.9rem; }
        .alert-error { background: #fef2f2; color: #991b1b; }
        .alert-success { background: #f0fdf4; color: #166534; }
        .link { margin-top: 16px; font-size: 0.9rem; text-align: center; }
        a { color: #2563eb; }
    </style>
</head>
<body>
<h1>로그인</h1>

<div th:if="${param.error}" class="alert alert-error">
    아이디 또는 비밀번호가 일치하지 않습니다.
</div>
<div th:if="${param.logout}" class="alert alert-success">
    로그아웃되었습니다.
</div>
<div th:if="${param.signup}" class="alert alert-success">
    회원가입이 완료되었습니다. 로그인해주세요.
</div>

<form th:action="@{/login}" method="post">
    <div>
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" required autofocus>
    </div>
    <div>
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required>
    </div>
    <button type="submit">로그인</button>
</form>

<div class="link">
    계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
</div>
</body>
</html>
