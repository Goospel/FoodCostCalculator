<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${recipe.name} + ' — 레시피'"></title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        h1 { font-size: 1.8rem; margin: 8px 0; }
        .meta { color: #6b7280; font-size: 0.95rem; margin-bottom: 24px; }
        .meta strong { color: #111827; }
        .btn { padding: 8px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; display: inline-block; }
        .btn-secondary { background: #6b7280; }
        .btn-danger { background: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; font-size: 0.95rem; }
        th { background: #f9fafb; }
        .actions { margin-top: 24px; display: flex; gap: 8px; }
        a { color: #2563eb; }
        .empty { color: #9ca3af; font-style: italic; }
        .cost-section { margin-top: 32px; padding: 16px 20px; background: #f9fafb; border-radius: 8px; }
        .cost-section h3 { margin-top: 0; }
        .cost-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        .cost-controls select { padding: 6px 10px; border-radius: 6px; border: 1px solid #d1d5db; }
        .missing { color: #b45309; }
        .price-cell { text-align: right; font-variant-numeric: tabular-nums; }
        .summary { display: flex; gap: 24px; margin-top: 16px; padding: 12px 16px; background: white; border-radius: 6px; border: 1px solid #e5e7eb; }
        .summary .label { color: #6b7280; font-size: 0.85rem; }
        .summary .value { font-size: 1.3rem; font-weight: 600; }
        .warning { background: #fef3c7; color: #92400e; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>
<nav>
    <div>
        <a th:href="@{/}">← 홈</a>
        <span sec:authorize="isAuthenticated()">
            | <a th:href="@{/recipes}">내 레시피</a>
        </span>
    </div>
    <div>
        <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}">로그인</a> |
            <a th:href="@{/signup}">회원가입</a>
        </span>
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <button type="submit" class="btn btn-secondary">로그아웃</button>
            </form>
        </span>
    </div>
</nav>

<h1 th:text="${recipe.name}"></h1>
<p class="meta">
    작성자: <strong th:text="${recipe.user.username}"></strong>
    · 인분: <strong th:text="${recipe.servings} + '인분'"></strong>
    · 작성일: <strong th:text="${#temporals.format(recipe.createdAt, 'yyyy-MM-dd HH:mm')}"></strong>
    <span th:if="${recipe.updatedAt != null and recipe.updatedAt != recipe.createdAt}">
        · 수정일: <strong th:text="${#temporals.format(recipe.updatedAt, 'yyyy-MM-dd HH:mm')}"></strong>
    </span>
</p>

<h3>재료</h3>
<table>
    <thead>
    <tr>
        <th style="width:10%">#</th>
        <th style="width:55%">카테고리</th>
        <th style="width:20%">양</th>
        <th style="width:15%">단위</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(recipe.ingredients)}">
        <td colspan="4" class="empty" style="text-align:center; padding:20px">재료가 없습니다</td>
    </tr>
    <tr th:each="ri, iter : ${recipe.ingredients}">
        <td th:text="${iter.index + 1}"></td>
        <td th:text="${ri.categoryName}"></td>
        <td th:text="${ri.amount}"></td>
        <td th:text="${ri.unit}"></td>
    </tr>
    </tbody>
</table>

<section class="cost-section">
    <h3>예상 원가</h3>

    <form class="cost-controls" method="get" th:action="@{/recipes/{id}(id=${recipe.id})}">
        <label for="policy">단가 정책:</label>
        <select id="policy" name="policy" onchange="this.form.submit()">
            <option th:each="p : ${policies}"
                    th:value="${p.name()}"
                    th:text="${p.label()}"
                    th:selected="${p == policy}"></option>
        </select>
        <noscript><button type="submit" class="btn">적용</button></noscript>
        <span style="color:#6b7280; font-size:0.85rem; margin-left:8px">
            동일 카테고리의 등록된 제품 중 선택된 정책에 따라 단가 결정
        </span>
    </form>

    <table th:if="${not #lists.isEmpty(cost.lines)}">
        <thead>
        <tr>
            <th style="width:5%">#</th>
            <th style="width:30%">카테고리</th>
            <th style="width:15%">양</th>
            <th style="width:10%">단위</th>
            <th style="width:15%" class="price-cell">단가 (원/단위)</th>
            <th style="width:10%" class="price-cell">후보 수</th>
            <th style="width:15%" class="price-cell">소계 (원)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="line, iter : ${cost.lines}" th:classappend="${line.missing} ? 'missing' : ''">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${line.categoryName}"></td>
            <td th:text="${line.amount}"></td>
            <td th:text="${line.unit}"></td>
            <td class="price-cell">
                <span th:if="${!line.missing}" th:text="${line.pricePerUnit}"></span>
                <span th:if="${line.missing}">—</span>
            </td>
            <td class="price-cell">
                <span th:if="${!line.missing}" th:text="${line.matchedCandidateCount}"></span>
                <span th:if="${line.missing}" class="missing">없음</span>
            </td>
            <td class="price-cell">
                <span th:if="${!line.missing}"
                      th:text="${#numbers.formatInteger(line.subtotal, 3, 'COMMA')} + ' 원'"></span>
                <span th:if="${line.missing}" class="missing">—</span>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="warning" th:if="${cost.hasMissing()}">
        ⚠️ <strong th:text="${cost.missingCount}"></strong>개의 재료가 매칭되지 않았습니다.
        해당 카테고리/단위로 등록된 제품이 없거나 관리자가 카테고리를 부여하지 않은 상태입니다.
    </div>

    <div class="summary">
        <div>
            <div class="label">전체 원가</div>
            <div class="value" th:text="${#numbers.formatInteger(cost.totalCost, 3, 'COMMA')} + ' 원'"></div>
        </div>
        <div>
            <div class="label">인분당 단가 (<span th:text="${recipe.servings}"></span>인분 기준)</div>
            <div class="value" th:text="${#numbers.formatInteger(cost.costPerServing, 3, 'COMMA')} + ' 원'"></div>
        </div>
    </div>
</section>

<div class="actions"
     th:if="${#authentication != null and #authentication.authenticated and recipe.user.username == #authentication.name}">
    <a th:href="@{/recipes/{id}/edit(id=${recipe.id})}" class="btn">수정</a>
    <form th:action="@{/recipes/{id}/delete(id=${recipe.id})}" method="post"
          onsubmit="return confirm('정말 삭제하시겠습니까?')" style="display:inline">
        <button type="submit" class="btn btn-danger">삭제</button>
    </form>
</div>
</body>
</html>
