spring:
  application:
    name: coastCalculator
  datasource:
    url: jdbc:mysql://localhost:3309/coast_calculator?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:coast}
    password: ${DB_PASSWORD:coastpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate     # Flyway가 스키마 관리. Hibernate는 엔티티 ↔ DB 일치 검증만
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true        # 기존 DB(이미 ddl-auto로 만들어진)에 적용 시 자동 baseline
    baseline-version: 1              # V1까지는 baseline으로 마크 (기존 DB 보존)
    baseline-description: "Init schema (Hibernate ddl-auto: update accumulated until 2026-05-21)"
    validate-on-migrate: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

server:
  error:
    include-message: never            # 사용자에게 예외 메시지 노출 X (운영 안전성)
    include-stacktrace: never
    include-binding-errors: never
    whitelabel:
      enabled: false                  # Whitelabel 페이지 사용 X (커스텀 에러 페이지 사용)

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

naver:
  api:
    base-url: https://openapi.naver.com/v1/search/shop.json
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    ttl-hours: 24
    display: 100
    mock-enabled: ${NAVER_MOCK_ENABLED:true}
    # T2-9: 외부 호출 안정성
    connect-timeout-ms: 5000          # HTTP connect 5초
    read-timeout-ms: 10000            # HTTP read 10초
    max-attempts: 3                   # 총 시도 횟수 (첫 시도 + 재시도 2회)
    initial-backoff-ms: 1000          # 재시도 backoff 시작값 (1s → 2s → 4s 지수)
    # T2-8: 비동기/스케줄러 refetch
    scheduled-refresh-enabled: true                  # 스케줄러 활성. 테스트는 false
    scheduled-refresh-interval-ms: 3600000           # 1시간 = 3,600,000 ms — TTL 24h 대비 보수적
    scheduled-refresh-initial-delay-ms: 60000        # 부팅 후 1분 뒤 첫 사이클 (워밍업 여유)

storage:
  upload-dir: ${UPLOAD_DIR:./uploads}

app:
  admin:
    username: ${INITIAL_ADMIN_USERNAME:admin}
    # 환경변수 INITIAL_ADMIN_PASSWORD 가 비어 있으면 부팅 시 랜덤 비번을 1회 로그로 출력합니다.
    # 운영에서는 반드시 환경변수로 주입하세요.
    initial-password: ${INITIAL_ADMIN_PASSWORD:}

# 제휴 마케팅 (수익 채널). tracking-id가 비어 있으면 일반 검색 URL만 노출됨.
affiliate:
  coupang:
    tracking-id: ${COUPANG_TRACKING_ID:}
